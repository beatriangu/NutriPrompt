{% extends "nutriprompt_app/base.html" %}

{% block title %}NutriPrompt · AI Dashboard{% endblock %}

{% block content %}
<style>
    .dashboard-page {
        min-height: 100vh;
        padding: clamp(0.8rem, 2vw, 1.5rem);
        background:
            radial-gradient(circle at top left, rgba(39, 174, 96, 0.18), transparent 32%),
            radial-gradient(circle at top right, rgba(52, 152, 219, 0.16), transparent 30%),
            linear-gradient(135deg, #f7fbf8 0%, #eef5f3 100%);
        color: #203040;
    }

    .dashboard-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
    }

    .dashboard-hero {
        display: grid;
        grid-template-columns: 1.3fr 0.7fr;
        gap: 1rem;
        align-items: stretch;
        margin-bottom: 0.8rem;
    }

    .hero-card,
    .status-card,
    .metric-card,
    .panel {
        border: 1px solid rgba(204, 218, 224, 0.9);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 40px rgba(28, 60, 72, 0.08);
        backdrop-filter: blur(14px);
    }

    .hero-card {
        padding: clamp(1rem, 2vw, 1.4rem);
    }

    .eyebrow {
        display: inline-flex;
        gap: 0.35rem;
        align-items: center;
        margin-bottom: 0.7rem;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: #eaf8ef;
        color: #1f8f4f;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .dashboard-hero h1 {
        margin: 0;
        max-width: 760px;
        color: #14324a;
        font-size: clamp(1.7rem, 4vw, 3rem);
        line-height: 1;
        letter-spacing: -0.05em;
    }

    .hero-description {
        max-width: 720px;
        margin: 0.7rem 0 0;
        color: #5f6c76;
        font-size: 0.92rem;
        line-height: 1.5;
    }

    .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-top: 1rem;
    }

    .dashboard-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0.65rem 0.9rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
    }

    .dashboard-btn.primary {
        background: linear-gradient(135deg, #27ae60, #1f8f4f);
        color: #fff;
    }

    .dashboard-btn.secondary {
        background: #fff;
        color: #18364f;
        border: 1px solid #dce6ee;
    }

    .status-card {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
        overflow: hidden;
        position: relative;
    }

    .status-card::after {
        content: "";
        position: absolute;
        right: -40px;
        bottom: -40px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(39, 174, 96, 0.10);
    }

    .status-pill {
        width: fit-content;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: #eaf8ef;
        color: #1f8f4f;
        font-size: 0.72rem;
        font-weight: 800;
    }

    .status-card strong {
        display: block;
        margin-top: 0.6rem;
        color: #14324a;
        font-size: 1.7rem;
        line-height: 1;
    }

    .status-card span {
        display: block;
        margin-top: 0.35rem;
        color: #70808d;
        line-height: 1.4;
        font-size: 0.88rem;
    }

    .metrics-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.7rem;
        margin-bottom: 0.7rem;
    }

    .metric-card {
        padding: 0.9rem;
    }

    .metric-icon {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        margin-bottom: 0.7rem;
        border-radius: 14px;
        background: #f0f7f3;
        font-size: 1.1rem;
    }

    .metric-card p {
        margin: 0;
        color: #70808d;
        font-size: 0.82rem;
        font-weight: 700;
    }

    .metric-card strong {
        display: block;
        margin-top: 0.2rem;
        color: #14324a;
        font-size: 1.6rem;
        letter-spacing: -0.04em;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
    }

    .panel {
        padding: clamp(0.9rem, 2vw, 1.2rem);
    }

    .panel h2 {
        margin: 0 0 0.35rem;
        color: #14324a;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
    }

    .panel-lead {
        margin: 0 0 0.8rem;
        color: #70808d;
        line-height: 1.45;
        font-size: 0.88rem;
    }

    .pipeline {
        display: grid;
        gap: 0.45rem;
    }

    .pipeline-step {
        display: flex;
        gap: 0.65rem;
        align-items: center;
        padding: 0.55rem 0.75rem;
        border: 1px solid #edf2f6;
        border-radius: 14px;
        background: #fbfdfc;
    }

    .step-dot {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        border-radius: 10px;
        background: linear-gradient(135deg, #eaf8ef, #eef7ff);
        color: #1f8f4f;
        font-weight: 900;
        font-size: 0.85rem;
    }

    .pipeline-step strong {
        display: block;
        color: #203040;
        font-size: 0.9rem;
    }

    .pipeline-step span {
        display: block;
        margin-top: 0.1rem;
        color: #70808d;
        font-size: 0.8rem;
    }

    .capabilities {
        display: grid;
        gap: 0.45rem;
    }

    .capability {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.55rem 0.75rem;
        border-radius: 14px;
        background: #fbfdfc;
        border: 1px solid #edf2f6;
        font-size: 0.88rem;
    }

    .capability strong {
        color: #203040;
    }

    .capability span {
        color: #1f8f4f;
        font-weight: 900;
    }

    .full-width {
        grid-column: 1 / -1;
    }

    .architecture-map {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 0.6rem;
        margin-top: 0.8rem;
    }

    .architecture-node {
        padding: 0.7rem;
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff, #f7fbf9);
        border: 1px solid #e3edf1;
        text-align: center;
    }

    .architecture-node b {
        display: block;
        color: #14324a;
        font-size: 0.85rem;
    }

    .architecture-node small {
        display: block;
        margin-top: 0.2rem;
        color: #70808d;
        line-height: 1.3;
        font-size: 0.72rem;
    }

    @media (max-width: 980px) {
        .dashboard-hero,
        .dashboard-grid {
            grid-template-columns: 1fr;
        }

        .metrics-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .architecture-map {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media (max-width: 560px) {
        .dashboard-page {
            padding: 1rem;
        }

        .metrics-grid,
        .architecture-map {
            grid-template-columns: 1fr;
        }

        .dashboard-hero h1 {
            font-size: 2rem;
        }
    }
</style>

<main class="dashboard-page">
    <div class="dashboard-shell">
        {{ block.super }}
    </div>
</main>
{% endblock %}
