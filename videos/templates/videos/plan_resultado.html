<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Plan Semanal NutriPrompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f9f4;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 1rem;
        }
        .card-header {
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }
        .plan-output {
            max-height: 500px;
            overflow-y: auto;
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="card shadow-lg">
        <div class="card-header bg-success text-white text-center">
            <h3 class="mb-0">✅ ¡Tu Plan NutriPrompt está listo!</h3>
        </div>
        <div class="card-body">
            <p class="lead text-center">Este es tu plan personalizado generado con IA, adaptado a tus necesidades y ritmo de esta semana 💚</p>

            <div class="plan-output">
                {{ plan }}
            </div>

            <div class="text-center mt-4">
                <a href="{% url 'formulario' %}" class="btn btn-outline-success">🔁 Generar otro plan</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
