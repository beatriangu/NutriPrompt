<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NutriPrompt – Tu Semana Saludable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background-image: url('https://images.unsplash.com/photo-1562554464-9eca17d8a4d5?auto=format&fit=crop&w=1600&q=80');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }
      .card {
        background-color: rgba(255, 255, 255, 0.9);
      }
    </style>
</head>
<body>

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h3 class="mb-0">📝 Rellena tus necesidades para generar tu plan saludable</h3>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" name="nombre" required>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Edad</label>
            <input type="number" class="form-control" name="edad" required>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Peso (kg)</label>
            <input type="number" class="form-control" name="peso">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Altura (cm)</label>
            <input type="number" class="form-control" name="altura">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Presupuesto semanal (€)</label>
          <input type="number" class="form-control" name="presupuesto">
        </div>

        <div class="mb-3">
          <label class="form-label">Horario ejercicio</label>
          <input type="text" class="form-control" name="ejercicio">
        </div>

        <div class="mb-3">
          <label class="form-label">Tiempo para cocinar al día (minutos)</label>
          <input type="number" class="form-control" name="cocina">
        </div>

        <div class="mb-3">
          <label class="form-label">Restricciones alimentarias</label>
          <input type="text" class="form-control" name="restricciones">
        </div>

        <div class="mb-3">
          <label class="form-label">Objetivo</label>
          <input type="text" class="form-control" name="objetivo" placeholder="Ej. perder peso, más energía...">
        </div>

        <div class="mb-3">
          <label class="form-label">Comentarios adicionales</label>
          <textarea class="form-control" name="comentarios" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">📤 Enviar y preparar plan</button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
