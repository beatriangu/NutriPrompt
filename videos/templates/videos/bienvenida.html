<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenida a NutriPrompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url("/media/fondos/bienvenida_fondo.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            max-width: 650px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.85);
        }
        .btn-custom {
            background-color: #28a745;
            color: white;
            font-weight: 500;
        }
        .btn-custom:hover {
            background-color: #218838;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="mb-3">👋 ¡Bienvenid@ a <strong>NutriPrompt</strong>!</h1>
    <p class="lead">¿Quieres comer mejor, moverte más y cuidarte sin complicaciones?</p>
    <p>En solo unos pasos crearemos tu <strong>plan semanal personalizado</strong> con ayuda de la inteligencia artificial.</p>

    <div class="d-grid gap-3 mt-4">
        <a href="{% url 'formulario' %}" class="btn btn-custom btn-lg">✨ Empezar mi plan</a>
        <a href="{% url 'ver_video' %}" class="btn btn-secondary btn-lg">🎥 Ver ejemplo en vídeo</a>
    </div>
</div>

</body>
</html>
