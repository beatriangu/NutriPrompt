<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NutriPrompt – Generar plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e6f4ea;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 1rem;
            background-color: #ffffffcc;
        }
        .card-header {
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }
        .btn-lg {
            font-size: 1.2rem;
            padding: 0.75rem 1.5rem;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-success text-white text-center">
            <h3 class="mb-0">💾 ¡Formulario recibido con éxito!</h3>
        </div>
        <div class="card-body text-center">
            <p class="lead">Ya casi está todo listo. Ahora vamos a generar tu plan semanal saludable con IA 💚</p>

            <form method="get" action="{% url 'cargando' %}">
                <input type="hidden" name="archivo_pdf" value="{{ archivo_pdf }}">
                <button type="submit" class="btn btn-primary btn-lg">
                    🚀 Generar Plan Semanal
                </button>
            </form>

            <div class="mt-4">
                <a href="{% url 'formulario' %}" class="btn btn-outline-secondary">⬅️ Volver al formulario</a>
            </div>
        </div>
    </div>
</di
