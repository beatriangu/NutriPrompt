<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generando tu plan...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f9f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .loader {
            width: 4rem;
            height: 4rem;
            border: 0.5rem solid #cce5cc;
            border-top: 0.5rem solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="text-center">
    <div class="loader mb-4"></div>
    <h4>Estamos preparando tu semana saludable con IA 💚</h4>
    <p class="text-muted">Esto solo tomará unos segundos...</p>

    <form id="autoform" method="post" action="{% url 'procesar_plan' %}">
        {% csrf_token %}
        <input type="hidden" name="archivo_pdf" value="{{ archivo_pdf }}">
    </form>
</div>

<script>
    setTimeout(function() {
        document.getElementById('autoform').submit();
    }, 2000);  // envía el formulario por POST automáticamente
</script>

</body>
</html>
