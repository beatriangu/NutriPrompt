<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NutriPrompt Demo: {{ video.titulo }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f9f9f9;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        video {
            width: 100%;
            max-width: 720px;
            border-radius: 8px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>{{ video.titulo }}</h1>
        <p>{{ video.descripcion }}</p>

        {% if video.archivo %}
            <video controls>
                <source src="{{ video.archivo.url }}" type="video/mp4">
                Tu navegador no soporta vídeo HTML5.
            </video>
        {% else %}
            <p><strong>⚠️ No hay archivo de vídeo disponible.</strong></p>
        {% endif %}
    </div>

</body>
</html>
