<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NutriPrompt – Generar Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1523413651479-597eb2da0ad6?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .card {
            border-radius: 1.5rem;
            background-color: rgba(255, 255, 255, 0.92);
            padding: 2rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            max-width: 600px;
            width: 100%;
        }
        .card-header {
            border-radius: 1.5rem 1.5rem 0 0;
            background-color: #198754;
            color: white;
            text-align: center;
            padding: 1.5rem;
        }
        .lead {
            font-size: 1.1rem;
            color: #495057;
        }
        .btn-lg {
            font-size: 1.2rem;
            padding: 0.75rem 1.5rem;
        }
        .btn-outline-secondary {
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h3>✅ ¡Formulario recibido con éxito!</h3>
    </div>
    <div class="card-body text-center">
        <p class="lead">Ya tenemos tus datos. En unos segundos vamos a crear tu plan saludable de forma personalizada usando IA 🤖💚</p>

        <form method="get" action="{% url 'cargando' %}">
            <input type="hidden" name="archivo_pdf" value="{{ archivo_pdf }}">
            <button type="submit" class="btn btn-success btn-lg">
                🚀 Generar mi plan semanal
            </button>
        </form>

        <a href="{% url 'formulario' %}" class="btn btn-outline-secondary w-100 mt-3">
            ⬅️ Volver al formulario
        </a>
    </div>
</div>

</body>
</html>
